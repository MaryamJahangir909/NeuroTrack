<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeuroTrack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-auth">

    <nav class="navbar">
        <div class="nav-brand">NeuroTrack</div>
        <div class="nav-links">
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Login to NeuroTrack AI System</p>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email"
                       id="login-email"
                       placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                       id="login-password"
                       placeholder="Enter your password"
                       onkeypress="handleLoginKey(event)">
            </div>

            <div id="login-error"
                 style="display:none; color:#ff4444;
                        margin-bottom:15px; font-size:14px;
                        padding:10px; background:rgba(255,68,68,0.1);
                        border-radius:8px; border-left:3px solid #ff4444;">
            </div>

            <button onclick="login()" class="btn-primary auth-btn" id="login-btn">
                Login
            </button>

            <div class="auth-footer">
                <p>Don't have an account?
                    <a href="signup.html">Sign Up Here</a>
                </p>
            </div>

            <div class="demo-accounts">
                <p>Demo Accounts:</p>
                <button onclick="fillDoctor()" class="demo-btn">
                    Login as Doctor
                </button>
                <button onclick="fillPatient()" class="demo-btn">
                    Login as Patient
                </button>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function handleLoginKey(event) {
            if (event.key === 'Enter') login();
        }

        function fillDoctor() {
            document.getElementById('login-email').value = 'doctor@neurotrack.com';
            document.getElementById('login-password').value = 'doctor123';
        }

        function fillPatient() {
            document.getElementById('login-email').value = 'maryam@neurotrack.com';
            document.getElementById('login-password').value = 'patient123';
        }

        function login() {
            var email = document.getElementById('login-email').value.trim();
            var password = document.getElementById('login-password').value.trim();
            var errorDiv = document.getElementById('login-error');
            var btn = document.getElementById('login-btn');

            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.style.display = 'block';
                return;
            }

            btn.textContent = 'Logging in...';
            btn.disabled = true;

            fetch(API_URL + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('role', data.user.role);
                    localStorage.setItem('name', data.user.name);

                    if (data.user.role === 'doctor') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'upload.html';
                    }
                } else {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                    btn.textContent = 'Login';
                    btn.disabled = false;
                }
            })
            .catch(function(err) {
                errorDiv.textContent = 'Connection error. Is server running?';
                errorDiv.style.display = 'block';
                btn.textContent = 'Login';
                btn.disabled = false;
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            var token = localStorage.getItem('token');
            var role = localStorage.getItem('role');
            if (token) {
                if (role === 'doctor') {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'upload.html';
                }
            }
        });
    </script>

</body>
</html>
