<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NeuroTrack</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">NeuroTrack</div>
        <div class="nav-links">
            <a href="login.html">Login</a>
            <a href="signup.html">Sign Up</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <span class="auth-icon">✨</span>
                <h1>Create Account</h1>
                <p>Join NeuroTrack AI System</p>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text"
                       id="signup-name"
                       placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email"
                       id="signup-email"
                       placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                       id="signup-password"
                       placeholder="Minimum 6 characters">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number"
                       id="signup-age"
                       placeholder="Enter your age">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text"
                       id="signup-phone"
                       placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label>Account Type</label>
                <select id="signup-role">
                    <option value="patient">Patient</option>
                    <option value="doctor">Doctor</option>
                </select>
            </div>

            <div id="signup-error"
                 style="display:none; color:#ff4444;
                        margin-bottom:15px; font-size:14px;
                        padding:10px; background:rgba(255,68,68,0.1);
                        border-radius:8px; border-left:3px solid #ff4444;">
            </div>

            <div id="signup-success"
                 style="display:none; color:#00ff88;
                        margin-bottom:15px; font-size:14px;
                        padding:10px; background:rgba(0,255,136,0.1);
                        border-radius:8px; border-left:3px solid #00ff88;">
            </div>

            <button onclick="signup()"
                    class="btn-primary auth-btn"
                    id="signup-btn">
                ✨ Create Account
            </button>

            <div class="auth-footer">
                <p>Already have an account?
                    <a href="login.html">Login Here</a>
                </p>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
    <script>
        function signup() {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value.trim();
            const age = document.getElementById('signup-age').value.trim();
            const phone = document.getElementById('signup-phone').value.trim();
            const role = document.getElementById('signup-role').value;

            const errorDiv = document.getElementById('signup-error');
            const successDiv = document.getElementById('signup-success');
            const btn = document.getElementById('signup-btn');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!name || !email || !password) {
                errorDiv.textContent = 'Name, Email and Password are required';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }

            btn.textContent = '🔄 Creating Account...';
            btn.disabled = true;

            fetch(API_URL + '/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: name,
                    email: email,
                    password: password,
                    age: age ? parseInt(age) : null,
                    phone: phone,
                    role: role
                })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.success) {
                    // Save token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('role', data.user.role);
                    localStorage.setItem('name', data.user.name);

                    successDiv.textContent = data.message + ' Redirecting...';
                    successDiv.style.display = 'block';

                    // Redirect based on role
                    setTimeout(function() {
                        if (data.user.role === 'doctor') {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = 'upload.html';
                        }
                    }, 1500);
                } else {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = 'block';
                    btn.textContent = '✨ Create Account';
                    btn.disabled = false;
                }
            })
            .catch(function(error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
                btn.textContent = '✨ Create Account';
                btn.disabled = false;
            });
        }
    </script>

</body>
</html>
